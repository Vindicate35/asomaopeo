<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASO Core - Yüzey Mühendisliği</title>
    <link rel="icon" type="image/png" href="alümina.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-panel: #161b22;
            --plasma-blue: #58a6ff;
            --alumina-gray: #ffffff;
            /* Daha parlak beyaz yapıldı */
            --spark-orange: #ff7b72;
            --text-main: #e6edf3;
            /* Sönük griler net beyaz-gri tonuna çekildi */
            --text-light: #ffffff;
            --border-color: rgba(230, 237, 243, 0.3);
        }

        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        #container-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #sidebar {
            width: 280px;
            height: 100vh;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--alumina-gray) var(--bg-dark);
        }

        #app-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
            background: var(--bg-dark);
        }

        .btn-refresh {
            background: rgba(88, 166, 255, 0.1);
            color: var(--plasma-blue);
            border: 1px solid var(--plasma-blue);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }

        .btn-refresh:hover {
            background: rgba(88, 166, 255, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.15);
        }

        .sci-select {
            width: 100%;
            background: var(--bg-dark);
            color: var(--alumina-gray);
            border: 1px solid var(--border-color);
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .sci-select:focus {
            border-color: var(--plasma-blue);
        }

        .menu-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 16px 20px;
            text-align: left;
            font-size: 1.05em;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .menu-btn:hover {
            background-color: rgba(201, 209, 217, 0.05);
            color: var(--alumina-gray);
        }

        .menu-btn.aktif {
            border-left: 3px solid var(--plasma-blue);
            color: var(--plasma-blue);
            background: linear-gradient(90deg, rgba(88, 166, 255, 0.1) 0%, transparent 100%);
            font-weight: bold;
        }

        .alt-menu-kapsayici {
            display: none;
            flex-direction: column;
            background-color: rgba(1, 4, 9, 0.3);
            border-left: 2px solid var(--border-color);
            margin-left: 10px;
            margin-bottom: 5px;
        }

        .alt-menu-kapsayici.acik {
            display: flex !important;
            animation: fadein 0.2s ease;
        }

        .alt-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 10px 15px 10px 30px;
            text-align: left;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .alt-btn:hover {
            color: var(--alumina-gray);
            background-color: rgba(201, 209, 217, 0.05);
        }

        .alt-btn.aktif {
            color: var(--plasma-blue);
            font-weight: bold;
        }

        .sim-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav id="sidebar">
        <div style="padding: 25px 20px; border-bottom: 1px solid var(--border-color);">
            <h1 style="color: var(--alumina-gray); margin: 0; font-size: 1.5em; letter-spacing: 1px;">
                ASO <span style="color: var(--plasma-blue);">CORE</span> <span
                    style="font-size: 0.4em; color: var(--text-main); vertical-align: middle;">v3.0</span>
            </h1>
            <div style="color: var(--text-main); font-size: 0.75em; margin-top: 5px; letter-spacing: 0.5px;">Anodik
                Kıvılcım Simülasyonu</div>
        </div>

        <div
            style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px;">
            <button class="btn-refresh" onclick="location.reload()">🔄 Sistemi Yenile</button>

            <div
                style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);">
                <label
                    style="color: var(--text-main); font-size: 0.75em; text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold;">🛠️
                    Alt Tabaka (Substrat)</label>
                <select id="global-substrat" class="sci-select" onchange="AsoSimulasyon.secimDegisti()"></select>
            </div>

            <div
                style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);">
                <label
                    style="color: var(--text-main); font-size: 0.75em; text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold;">🧪
                    Baz Elektrolit</label>
                <select id="global-elektrolit" class="sci-select" onchange="AsoSimulasyon.tetikleAktifHesaplama()">
                    <option value="silikat">Silikat Bazlı (Na₂SiO₃)</option>
                    <option value="fosfat">Fosfat Bazlı (Na₃PO₄)</option>
                    <option value="aluminat">Alüminat Bazlı (NaAlO₂)</option>
                    <option value="asidik">Seyreltik Sülfürik Asit (H₂SO₄)</option>
                </select>
            </div>

            <div
                style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);">
                <div style="display:flex; justify-content:space-between; margin-bottom: 5px;">
                    <label
                        style="color: var(--text-main); font-size: 0.75em; text-transform: uppercase; font-weight: bold;">🌡️
                        Banyo Sıcaklığı</label>
                    <span id="gosterge-sicaklik"
                        style="color:var(--spark-orange); font-size: 0.8em; font-weight:bold;">25°C</span>
                </div>
                <input type="range" id="global-sicaklik" min="10" max="60" step="1" value="25"
                    style="width: 100%; accent-color: var(--spark-orange);"
                    oninput="document.getElementById('gosterge-sicaklik').innerText = this.value + '°C'; AsoSimulasyon.tetikleAktifHesaplama()">
            </div>

            <div
                style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);">
                <div style="display:flex; justify-content:space-between; margin-bottom: 5px;">
                    <label
                        style="color: var(--text-main); font-size: 0.75em; text-transform: uppercase; font-weight: bold;">📏
                        Numune Alanı</label>
                    <span id="gosterge-alan" style="color:var(--plasma-blue); font-size: 0.8em; font-weight:bold;">2.0
                        dm²</span>
                </div>
                <input type="range" id="global-alan" min="0.5" max="10" step="0.5" value="2.0"
                    style="width: 100%; accent-color: var(--plasma-blue);"
                    oninput="document.getElementById('gosterge-alan').innerText = this.value + ' dm²'; AsoSimulasyon.tetikleAktifHesaplama()">
            </div>
        </div>

        <div id="menu-listeler" style="padding-top: 10px;">
            <button class="menu-btn aktif" id="btn-kinetik"
                onclick="AsoSimulasyon.toggleMenu('menu-kinetik', 'btn-kinetik')">⚡ Kinetik Analizler</button>
            <div id="menu-kinetik" class="alt-menu-kapsayici acik">
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'voltaj-zaman')">Büyüme Rejimleri (U-t /
                    I-t)</button>
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'osiloskop')">Darbeli Akım
                    Osiloskopu</button>
            </div>

            <button class="menu-btn" id="btn-korozyon"
                onclick="AsoSimulasyon.toggleMenu('menu-korozyon', 'btn-korozyon')">🧪 Elektrokimya</button>
            <div id="menu-korozyon" class="alt-menu-kapsayici">
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'elektrokimya')">PDP (Tafel) & EIS
                    (Nyquist)</button>
            </div>

            <button class="menu-btn" id="btn-malzeme"
                onclick="AsoSimulasyon.toggleMenu('menu-malzeme', 'btn-malzeme')">🔬 Malzeme Bilimi</button>
            <div id="menu-malzeme" class="alt-menu-kapsayici">
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'faz')">Alfa/Gama Faz Dağılımı</button>
            </div>

            <button class="menu-btn" id="btn-literatur"
                onclick="AsoSimulasyon.toggleMenu('menu-literatur', 'btn-literatur')">📊 Literatür Analizi</button>
            <div id="menu-literatur" class="alt-menu-kapsayici">
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'yayin-grafigi')">ASO Yayın-Atıf
                    Grafiği</button>
            </div>

            <button class="menu-btn" id="btn-ekoller"
                onclick="AsoSimulasyon.toggleMenu('menu-ekoller', 'btn-ekoller')">⚡ Ekoller & Aralıklar</button>
            <div id="menu-ekoller" class="alt-menu-kapsayici">
                <button class="alt-btn" onclick="AsoSimulasyon.yukle(this, 'ekoller')">PEO vs MAO vs ASO Kıyası</button>
            </div>
        </div>
    </nav>

    <div id="container-wrapper">
        <main id="app-content">
            <div style="color:var(--text-main); text-align:center; margin-top:50px;">
                <h1>Termodinamik Motor Başlatılıyor...</h1>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
